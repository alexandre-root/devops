services:
    # --- BASE DE DONNÉES ---
    database:
        image: postgres:15-alpine
        container_name: postgres_db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        networks:
            - app-network
        volumes:
            - postgres_data:/var/lib/postgresql/data

    # --- BACKEND ---
    backend:
        build: ./backend
        container_name: node_backend
        restart: always
        depends_on:
            - database
        environment:
            DB_HOST: database
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
            PORT: 3000
        networks:
            - app-network

    # --- FRONTEND ---
    frontend:
        build: ./frontend
        container_name: nginx_frontend
        restart: always
        ports:
            - "80:80"
        depends_on:
            - backend
        networks:
            - app-network

# b) Réseau personnalisé pour l'isolation
networks:
    app-network:
        driver: bridge

# c) Volume persistant pour PostgreSQL
volumes:
    postgres_data:
