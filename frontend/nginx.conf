server {
    listen 80;
    server_name localhost;

    # Dossier des fichiers statiques
    root /usr/share/nginx/html;
    index index.html;

    # Gestion du Front-end
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy pour le Back-end
    # Redirige toutes les requêtes commençant par /api/ vers le serveur Node.js
    location /api/ {
        proxy_pass http://backend:3000/; # Le '/' final retire '/api' lors du transfert au back
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gestion d'erreur (optionnel)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
